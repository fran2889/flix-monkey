info:
    name: /search
    type: http
    seq: 1

http:
    method: GET
    url: https://xmdbapi.com/api/v1/search?apiKey={{XMDB_API_KEY}}&q={{title}}&limit=1
    params:
        - name: apiKey
          value: '{{XMDB_API_KEY}}'
          type: query
        - name: q
          value: '{{title}}'
          type: query
        - name: limit
          value: '1'
          type: query
    auth: inherit

settings:
    encodeUrl: true
    timeout: 0
    followRedirects: true
    maxRedirects: 5

info:
    name: byId
    type: http
    seq: 2

http:
    method: GET
    url: https://www.omdbapi.com/?apikey={{OMDB_API_KEY}}&i={{imdb_id}}
    params:
        - name: apikey
          value: '{{OMDB_API_KEY}}'
          type: query
        - name: i
          value: '{{imdb_id}}'
          type: query
    auth: inherit

settings:
    encodeUrl: true
    timeout: 0
    followRedirects: true
    maxRedirects: 5

info:
    name: byTitle
    type: http
    seq: 1

http:
    method: GET
    url: https://www.omdbapi.com/?apikey={{OMDB_API_KEY}}&t={{title}}
    params:
        - name: apikey
          value: '{{OMDB_API_KEY}}'
          type: query
        - name: t
          value: '{{title}}'
          type: query
    auth: inherit

settings:
    encodeUrl: true
    timeout: 0
    followRedirects: true
    maxRedirects: 5

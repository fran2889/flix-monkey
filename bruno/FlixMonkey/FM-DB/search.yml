info:
    name: /search
    type: http
    seq: 1

http:
    method: GET
    url: https://imdb.iamidiotareyoutoo.com/search?q={{title}}
    params:
        - name: q
          value: '{{title}}'
          type: query
    auth: inherit

settings:
    encodeUrl: true
    timeout: 0
    followRedirects: true
    maxRedirects: 5

name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

jobs:
    lint-and-audit:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: '24.x'
                  cache: 'npm'
            - run: npm ci --ignore-scripts
            - run: npm run audit
            - run: npm run lint
            - run: npm run format:check

    build:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: '24.x'
                  cache: 'npm'
            - run: npm ci --ignore-scripts
            - run: npm rebuild sharp
            - run: npm run build

    test-unit:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: '24.x'
                  cache: 'npm'
            - run: npm ci --ignore-scripts
            - run: npm run test:unit

    test-integration:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: '24.x'
                  cache: 'npm'
            - run: npm ci --ignore-scripts
            - run: npm run test:integration

    test-ui:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: '24.x'
                  cache: 'npm'
            - run: npm ci --ignore-scripts
            - run: npm run test:ui

    test-coverage:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: '24.x'
                  cache: 'npm'
            - run: npm ci --ignore-scripts
            - run: npm run test:coverage
            - name: Upload coverage results
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: coverage-report
                  path: coverage
                  retention-days: 7

    merge-gate:
        runs-on: ubuntu-latest
        if: always()
        needs: [lint-and-audit, build, test-unit, test-integration, test-ui, test-coverage]
        steps:
            - name: Check for failures
              if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
              run: exit 1
            - run: echo "All required jobs succeeded!"

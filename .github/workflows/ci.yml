name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    install:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '22.x'
                  cache: 'npm'
            - run: npm ci
            - name: Upload node_modules
              uses: actions/upload-artifact@v4
              with:
                  name: node-modules
                  path: node_modules
                  retention-days: 1

    lint-and-audit:
        runs-on: ubuntu-latest
        needs: install
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '22.x'
            - name: Download node_modules
              uses: actions/download-artifact@v4
              with:
                  name: node-modules
                  path: node_modules
            - run: npm run audit
            - run: npm run lint
            - run: npm run format:check

    build:
        runs-on: ubuntu-latest
        needs: install
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '22.x'
            - name: Download node_modules
              uses: actions/download-artifact@v4
              with:
                  name: node-modules
                  path: node_modules
            - run: npm run build

    test-unit:
        runs-on: ubuntu-latest
        needs: install
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '22.x'
            - name: Download node_modules
              uses: actions/download-artifact@v4
              with:
                  name: node-modules
                  path: node_modules
            - run: npm run test:unit

    test-integration:
        runs-on: ubuntu-latest
        needs: install
        if: ${{ secrets.OMDB_API_KEY != '' && secrets.XMDB_API_KEY != '' }}
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '22.x'
            - name: Download node_modules
              uses: actions/download-artifact@v4
              with:
                  name: node-modules
                  path: node_modules
            - run: npm run test:integration

    test-ui:
        runs-on: ubuntu-latest
        needs: install
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '22.x'
            - name: Download node_modules
              uses: actions/download-artifact@v4
              with:
                  name: node-modules
                  path: node_modules
            - run: npm run test:ui

    test-coverage:
        runs-on: ubuntu-latest
        needs: install
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '22.x'
            - name: Download node_modules
              uses: actions/download-artifact@v4
              with:
                  name: node-modules
                  path: node_modules
            - run: npm run test:coverage
            - name: Upload coverage results
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-report
                  path: coverage
                  retention-days: 7

    merge-gate:
        runs-on: ubuntu-latest
        needs: [lint-and-audit, build, test-unit, test-integration, test-ui, test-coverage]
        steps:
            - run: echo "All required jobs succeeded!"
